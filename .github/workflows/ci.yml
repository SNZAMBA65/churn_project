name: CI - Vérification du projet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Vérification du style de code (flake8)
        run: |
          flake8 src/ --max-line-length=120 --ignore=E501,W503 --exclude=__pycache__

      - name: Vérification des imports src/
        run: |
          python -c "import sys; sys.path.append('src'); import preprocessing; import models; import evaluation; print('Imports OK')"

      - name: Exécution des tests unitaires
        run: |
          pytest tests/ -v --tb=short
        continue-on-error: false